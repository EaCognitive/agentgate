<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" width="900" height="400">
  <defs>
    <linearGradient id="stepGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <linearGradient id="blockGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444"/>
      <stop offset="100%" style="stop-color:#dc2626"/>
    </linearGradient>
    <linearGradient id="successGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#16a34a"/>
    </linearGradient>
    <filter id="shadow2" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#ef4444"/>
    </marker>
    <marker id="arrowGreen2" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#22c55e"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="400" fill="#f8fafc"/>

  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" fill="#1e293b" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600">Request Lifecycle</text>

  <!-- Step 1: Client Request -->
  <g filter="url(#shadow2)" transform="translate(30, 60)">
    <rect width="100" height="80" rx="6" fill="white" stroke="#3b82f6" stroke-width="2"/>
    <circle cx="50" cy="25" r="12" fill="#3b82f6"/>
    <text x="50" y="30" text-anchor="middle" fill="white" font-family="system-ui, sans-serif" font-size="12" font-weight="600">1</text>
    <text x="50" y="55" text-anchor="middle" fill="#1e293b" font-family="system-ui, sans-serif" font-size="11" font-weight="500">Client</text>
    <text x="50" y="70" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="10">Request</text>
  </g>

  <!-- Arrow 1→2 -->
  <path d="M135 100 L165 100" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- Step 2: PII Detection -->
  <g filter="url(#shadow2)" transform="translate(170, 60)">
    <rect width="100" height="80" rx="6" fill="white" stroke="#10b981" stroke-width="2"/>
    <circle cx="50" cy="25" r="12" fill="#10b981"/>
    <text x="50" y="30" text-anchor="middle" fill="white" font-family="system-ui, sans-serif" font-size="12" font-weight="600">2</text>
    <text x="50" y="55" text-anchor="middle" fill="#1e293b" font-family="system-ui, sans-serif" font-size="11" font-weight="500">PII Vault</text>
    <text x="50" y="70" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="10">Detect & Mask</text>
  </g>

  <!-- Arrow 2→3 -->
  <path d="M275 100 L305 100" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- Step 3: Validation -->
  <g filter="url(#shadow2)" transform="translate(310, 60)">
    <rect width="100" height="80" rx="6" fill="white" stroke="#10b981" stroke-width="2"/>
    <circle cx="50" cy="25" r="12" fill="#10b981"/>
    <text x="50" y="30" text-anchor="middle" fill="white" font-family="system-ui, sans-serif" font-size="12" font-weight="600">3</text>
    <text x="50" y="55" text-anchor="middle" fill="#1e293b" font-family="system-ui, sans-serif" font-size="11" font-weight="500">Validator</text>
    <text x="50" y="70" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="10">Security Check</text>
  </g>

  <!-- Arrow 3→4 -->
  <path d="M415 100 L445 100" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- Step 4: Rate Limit -->
  <g filter="url(#shadow2)" transform="translate(450, 60)">
    <rect width="100" height="80" rx="6" fill="white" stroke="#10b981" stroke-width="2"/>
    <circle cx="50" cy="25" r="12" fill="#10b981"/>
    <text x="50" y="30" text-anchor="middle" fill="white" font-family="system-ui, sans-serif" font-size="12" font-weight="600">4</text>
    <text x="50" y="55" text-anchor="middle" fill="#1e293b" font-family="system-ui, sans-serif" font-size="11" font-weight="500">Rate Limit</text>
    <text x="50" y="70" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="10">Throttle</text>
  </g>

  <!-- Arrow 4→5 -->
  <path d="M555 100 L585 100" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- Step 5: Cost Check -->
  <g filter="url(#shadow2)" transform="translate(590, 60)">
    <rect width="100" height="80" rx="6" fill="white" stroke="#10b981" stroke-width="2"/>
    <circle cx="50" cy="25" r="12" fill="#10b981"/>
    <text x="50" y="30" text-anchor="middle" fill="white" font-family="system-ui, sans-serif" font-size="12" font-weight="600">5</text>
    <text x="50" y="55" text-anchor="middle" fill="#1e293b" font-family="system-ui, sans-serif" font-size="11" font-weight="500">Cost Track</text>
    <text x="50" y="70" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="10">Budget Check</text>
  </g>

  <!-- Arrow 5→6 -->
  <path d="M695 100 L725 100" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- Step 6: LLM -->
  <g filter="url(#shadow2)" transform="translate(730, 60)">
    <rect width="100" height="80" rx="6" fill="white" stroke="#8b5cf6" stroke-width="2"/>
    <circle cx="50" cy="25" r="12" fill="#8b5cf6"/>
    <text x="50" y="30" text-anchor="middle" fill="white" font-family="system-ui, sans-serif" font-size="12" font-weight="600">6</text>
    <text x="50" y="55" text-anchor="middle" fill="#1e293b" font-family="system-ui, sans-serif" font-size="11" font-weight="500">LLM</text>
    <text x="50" y="70" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="10">Execute</text>
  </g>

  <!-- Decision Paths Section -->
  <text x="450" y="180" text-anchor="middle" fill="#374151" font-family="system-ui, sans-serif" font-size="13" font-weight="600">Decision Points</text>

  <!-- Blocked Path -->
  <g transform="translate(100, 200)">
    <rect width="200" height="70" rx="6" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5" filter="url(#shadow2)"/>
    <circle cx="30" cy="35" r="15" fill="#ef4444"/>
    <text x="30" y="40" text-anchor="middle" fill="white" font-family="system-ui, sans-serif" font-size="14" font-weight="600">X</text>
    <text x="120" y="30" text-anchor="middle" fill="#991b1b" font-family="system-ui, sans-serif" font-size="12" font-weight="600">BLOCKED</text>
    <text x="120" y="48" text-anchor="middle" fill="#7f1d1d" font-family="system-ui, sans-serif" font-size="10">Attack detected, rate exceeded,</text>
    <text x="120" y="62" text-anchor="middle" fill="#7f1d1d" font-family="system-ui, sans-serif" font-size="10">or budget limit reached</text>
  </g>

  <!-- Approval Path -->
  <g transform="translate(350, 200)">
    <rect width="200" height="70" rx="6" fill="#fefce8" stroke="#eab308" stroke-width="1.5" filter="url(#shadow2)"/>
    <circle cx="30" cy="35" r="15" fill="#eab308"/>
    <text x="30" y="41" text-anchor="middle" fill="white" font-family="system-ui, sans-serif" font-size="16" font-weight="600">?</text>
    <text x="120" y="30" text-anchor="middle" fill="#854d0e" font-family="system-ui, sans-serif" font-size="12" font-weight="600">PENDING APPROVAL</text>
    <text x="120" y="48" text-anchor="middle" fill="#713f12" font-family="system-ui, sans-serif" font-size="10">Sensitive operation requires</text>
    <text x="120" y="62" text-anchor="middle" fill="#713f12" font-family="system-ui, sans-serif" font-size="10">human authorization</text>
  </g>

  <!-- Success Path -->
  <g transform="translate(600, 200)">
    <rect width="200" height="70" rx="6" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5" filter="url(#shadow2)"/>
    <circle cx="30" cy="35" r="15" fill="#22c55e"/>
    <text x="30" y="41" text-anchor="middle" fill="white" font-family="system-ui, sans-serif" font-size="16" font-weight="600">✓</text>
    <text x="120" y="30" text-anchor="middle" fill="#166534" font-family="system-ui, sans-serif" font-size="12" font-weight="600">SUCCESS</text>
    <text x="120" y="48" text-anchor="middle" fill="#14532d" font-family="system-ui, sans-serif" font-size="10">Response with PII restored,</text>
    <text x="120" y="62" text-anchor="middle" fill="#14532d" font-family="system-ui, sans-serif" font-size="10">cost recorded, audit logged</text>
  </g>

  <!-- Bottom labels -->
  <g transform="translate(0, 310)">
    <rect x="100" y="0" width="700" height="60" rx="6" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
    <text x="450" y="22" text-anchor="middle" fill="#334155" font-family="system-ui, sans-serif" font-size="11" font-weight="600">Every request generates an immutable audit entry</text>
    <text x="450" y="42" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="10">HMAC-SHA256 chain integrity • Tamper detection • Compliance-ready exports (HIPAA, SOC 2, GDPR)</text>
  </g>
</svg>
