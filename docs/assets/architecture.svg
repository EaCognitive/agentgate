<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
  <defs>
    <linearGradient id="clientGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#1d4ed8"/>
    </linearGradient>
    <linearGradient id="gatewayGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <linearGradient id="providerGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#6d28d9"/>
    </linearGradient>
    <linearGradient id="storageGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="600" fill="#f8fafc"/>

  <!-- Client Layer -->
  <g filter="url(#shadow)">
    <rect x="40" y="40" width="200" height="180" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1"/>
    <rect x="40" y="40" width="200" height="36" rx="8" fill="url(#clientGrad)"/>
    <rect x="40" y="68" width="200" height="8" fill="url(#clientGrad)"/>
    <text x="140" y="64" text-anchor="middle" fill="white" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600">Client Layer</text>

    <rect x="60" y="92" width="160" height="36" rx="4" fill="#eff6ff" stroke="#3b82f6" stroke-width="1"/>
    <text x="140" y="115" text-anchor="middle" fill="#1e40af" font-family="system-ui, sans-serif" font-size="12" font-weight="500">Python SDK</text>

    <rect x="60" y="136" width="160" height="36" rx="4" fill="#eff6ff" stroke="#3b82f6" stroke-width="1"/>
    <text x="140" y="159" text-anchor="middle" fill="#1e40af" font-family="system-ui, sans-serif" font-size="12" font-weight="500">REST API</text>

    <rect x="60" y="180" width="160" height="36" rx="4" fill="#eff6ff" stroke="#3b82f6" stroke-width="1"/>
    <text x="140" y="203" text-anchor="middle" fill="#1e40af" font-family="system-ui, sans-serif" font-size="12" font-weight="500">Dashboard</text>
  </g>

  <!-- AgentGate Core -->
  <g filter="url(#shadow)">
    <rect x="300" y="40" width="300" height="400" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1"/>
    <rect x="300" y="40" width="300" height="36" rx="8" fill="url(#gatewayGrad)"/>
    <rect x="300" y="68" width="300" height="8" fill="url(#gatewayGrad)"/>
    <text x="450" y="64" text-anchor="middle" fill="white" font-family="system-ui, sans-serif" font-size="14" font-weight="600">AgentGate Core</text>

    <!-- Middleware Chain -->
    <text x="320" y="105" fill="#374151" font-family="system-ui, sans-serif" font-size="11" font-weight="600">MIDDLEWARE CHAIN</text>

    <rect x="320" y="115" width="120" height="32" rx="4" fill="#ecfdf5" stroke="#10b981" stroke-width="1"/>
    <text x="380" y="136" text-anchor="middle" fill="#047857" font-family="system-ui, sans-serif" font-size="11" font-weight="500">PII Vault</text>

    <rect x="320" y="155" width="120" height="32" rx="4" fill="#ecfdf5" stroke="#10b981" stroke-width="1"/>
    <text x="380" y="176" text-anchor="middle" fill="#047857" font-family="system-ui, sans-serif" font-size="11" font-weight="500">Validator</text>

    <rect x="320" y="195" width="120" height="32" rx="4" fill="#ecfdf5" stroke="#10b981" stroke-width="1"/>
    <text x="380" y="216" text-anchor="middle" fill="#047857" font-family="system-ui, sans-serif" font-size="11" font-weight="500">Rate Limiter</text>

    <rect x="320" y="235" width="120" height="32" rx="4" fill="#ecfdf5" stroke="#10b981" stroke-width="1"/>
    <text x="380" y="256" text-anchor="middle" fill="#047857" font-family="system-ui, sans-serif" font-size="11" font-weight="500">Cost Tracker</text>

    <rect x="320" y="275" width="120" height="32" rx="4" fill="#ecfdf5" stroke="#10b981" stroke-width="1"/>
    <text x="380" y="296" text-anchor="middle" fill="#047857" font-family="system-ui, sans-serif" font-size="11" font-weight="500">Audit Log</text>

    <rect x="320" y="315" width="120" height="32" rx="4" fill="#ecfdf5" stroke="#10b981" stroke-width="1"/>
    <text x="380" y="336" text-anchor="middle" fill="#047857" font-family="system-ui, sans-serif" font-size="11" font-weight="500">Approval</text>

    <!-- Arrows between middleware -->
    <path d="M380 147 L380 155" stroke="#10b981" stroke-width="1.5" fill="none" marker-end="url(#arrowGreen)"/>
    <path d="M380 187 L380 195" stroke="#10b981" stroke-width="1.5" fill="none"/>
    <path d="M380 227 L380 235" stroke="#10b981" stroke-width="1.5" fill="none"/>
    <path d="M380 267 L380 275" stroke="#10b981" stroke-width="1.5" fill="none"/>
    <path d="M380 307 L380 315" stroke="#10b981" stroke-width="1.5" fill="none"/>

    <!-- Security Layer -->
    <text x="460" y="105" fill="#374151" font-family="system-ui, sans-serif" font-size="11" font-weight="600">SECURITY</text>

    <rect x="460" y="115" width="120" height="32" rx="4" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
    <text x="520" y="136" text-anchor="middle" fill="#92400e" font-family="system-ui, sans-serif" font-size="11" font-weight="500">Threat Detector</text>

    <rect x="460" y="155" width="120" height="32" rx="4" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
    <text x="520" y="176" text-anchor="middle" fill="#92400e" font-family="system-ui, sans-serif" font-size="11" font-weight="500">RBAC Engine</text>

    <rect x="460" y="195" width="120" height="32" rx="4" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
    <text x="520" y="216" text-anchor="middle" fill="#92400e" font-family="system-ui, sans-serif" font-size="11" font-weight="500">Encryption</text>

    <!-- Features summary -->
    <rect x="320" y="365" width="260" height="60" rx="4" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
    <text x="450" y="388" text-anchor="middle" fill="#475569" font-family="system-ui, sans-serif" font-size="10">HMAC-SHA256 Audit Chain</text>
    <text x="450" y="403" text-anchor="middle" fill="#475569" font-family="system-ui, sans-serif" font-size="10">AES-256-GCM Encryption</text>
    <text x="450" y="418" text-anchor="middle" fill="#475569" font-family="system-ui, sans-serif" font-size="10">WebAuthn / Passkeys</text>
  </g>

  <!-- LLM Providers -->
  <g filter="url(#shadow)">
    <rect x="660" y="40" width="200" height="180" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1"/>
    <rect x="660" y="40" width="200" height="36" rx="8" fill="url(#providerGrad)"/>
    <rect x="660" y="68" width="200" height="8" fill="url(#providerGrad)"/>
    <text x="760" y="64" text-anchor="middle" fill="white" font-family="system-ui, sans-serif" font-size="14" font-weight="600">LLM Providers</text>

    <rect x="680" y="92" width="160" height="36" rx="4" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1"/>
    <text x="760" y="115" text-anchor="middle" fill="#5b21b6" font-family="system-ui, sans-serif" font-size="12" font-weight="500">OpenAI</text>

    <rect x="680" y="136" width="160" height="36" rx="4" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1"/>
    <text x="760" y="159" text-anchor="middle" fill="#5b21b6" font-family="system-ui, sans-serif" font-size="12" font-weight="500">Anthropic</text>

    <rect x="680" y="180" width="160" height="36" rx="4" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1"/>
    <text x="760" y="203" text-anchor="middle" fill="#5b21b6" font-family="system-ui, sans-serif" font-size="12" font-weight="500">Google AI</text>
  </g>

  <!-- Storage Layer -->
  <g filter="url(#shadow)">
    <rect x="660" y="260" width="200" height="180" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1"/>
    <rect x="660" y="260" width="200" height="36" rx="8" fill="url(#storageGrad)"/>
    <rect x="660" y="288" width="200" height="8" fill="url(#storageGrad)"/>
    <text x="760" y="284" text-anchor="middle" fill="white" font-family="system-ui, sans-serif" font-size="14" font-weight="600">Persistence</text>

    <rect x="680" y="312" width="160" height="50" rx="4" fill="#fffbeb" stroke="#f59e0b" stroke-width="1"/>
    <text x="760" y="335" text-anchor="middle" fill="#92400e" font-family="system-ui, sans-serif" font-size="12" font-weight="500">PostgreSQL</text>
    <text x="760" y="352" text-anchor="middle" fill="#a16207" font-family="system-ui, sans-serif" font-size="10">Primary Database</text>

    <rect x="680" y="370" width="160" height="50" rx="4" fill="#fffbeb" stroke="#f59e0b" stroke-width="1"/>
    <text x="760" y="393" text-anchor="middle" fill="#92400e" font-family="system-ui, sans-serif" font-size="12" font-weight="500">Redis</text>
    <text x="760" y="410" text-anchor="middle" fill="#a16207" font-family="system-ui, sans-serif" font-size="10">Cache / Rate Limits</text>
  </g>

  <!-- Connection Arrows -->
  <!-- Client to Gateway -->
  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#3b82f6"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#10b981"/>
    </marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#8b5cf6"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#f59e0b"/>
    </marker>
  </defs>

  <path d="M240 130 L290 130" stroke="#3b82f6" stroke-width="2" fill="none" marker-end="url(#arrowBlue)"/>
  <path d="M600 200 L650 130" stroke="#8b5cf6" stroke-width="2" fill="none" marker-end="url(#arrowPurple)"/>
  <path d="M600 350 L650 350" stroke="#f59e0b" stroke-width="2" fill="none" marker-end="url(#arrowOrange)"/>

  <!-- Legend -->
  <g transform="translate(40, 480)">
    <text x="0" y="0" fill="#374151" font-family="system-ui, sans-serif" font-size="12" font-weight="600">Data Flow</text>
    <line x1="0" y1="20" x2="40" y2="20" stroke="#3b82f6" stroke-width="2"/>
    <text x="50" y="24" fill="#64748b" font-family="system-ui, sans-serif" font-size="11">Request</text>
    <line x1="120" y1="20" x2="160" y2="20" stroke="#8b5cf6" stroke-width="2"/>
    <text x="170" y="24" fill="#64748b" font-family="system-ui, sans-serif" font-size="11">LLM Call</text>
    <line x1="240" y1="20" x2="280" y2="20" stroke="#f59e0b" stroke-width="2"/>
    <text x="290" y="24" fill="#64748b" font-family="system-ui, sans-serif" font-size="11">Storage</text>
  </g>

  <!-- Title -->
  <text x="450" y="560" text-anchor="middle" fill="#1e293b" font-family="system-ui, sans-serif" font-size="16" font-weight="600">AgentGate System Architecture</text>
  <text x="450" y="580" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="12">Enterprise AI Agent Governance Platform</text>
</svg>
