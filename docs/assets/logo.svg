<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="shield-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <linearGradient id="inner-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#34d399"/>
      <stop offset="100%" style="stop-color:#10b981"/>
    </linearGradient>
  </defs>

  <!-- Shield shape -->
  <path d="M60 10 L100 28 L100 62 Q100 95 60 112 Q20 95 20 62 L20 28 Z"
        fill="url(#shield-gradient)"
        stroke="#22c55e"
        stroke-width="2"/>

  <!-- Inner shield highlight -->
  <path d="M60 22 L88 36 L88 60 Q88 86 60 100 Q32 86 32 60 L32 36 Z"
        fill="none"
        stroke="url(#inner-gradient)"
        stroke-width="1.5"
        opacity="0.6"/>

  <!-- Checkmark -->
  <path d="M42 58 L54 70 L80 44"
        fill="none"
        stroke="#ffffff"
        stroke-width="6"
        stroke-linecap="round"
        stroke-linejoin="round"/>
</svg>
